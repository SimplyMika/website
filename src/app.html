<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<style>
			@font-face {
				font-family: "Comfortaa";
				font-weight: 300 700;
				src: url(%sveltekit.assets%/Comfortaa.ttf);
			}

			:root {
				--black: oklab(0% 2% -2%);
				--night: oklab(10% 2% -2%);
				--slate: oklab(20% 2% -2%);

				--coral: oklab(65% 80% 25%);

				--shell: oklab(80% -2% 2%);
				--paper: oklab(90% -2% 2%);
				--white: oklab(100% -2% 2%);

				scroll-behavior: smooth;
				scroll-padding-top: 1em;
				scrollbar-width: thin;
				scrollbar-color: var(--coral) var(--night);
			}

			body {
				margin: 0;

				font-family: "Comfortaa";
				line-height: 1.5;

				background-color: var(--black);
				color: var(--white);
			}

			::selection {
				background-color: oklab(from var(--coral) l a b / 75%);
			}

			a {
				--highlight-color: var(--coral);
				--highlight-ratio: 25%;

				color: inherit;
				text-decoration: none;
				background: linear-gradient(to top, var(--highlight-color) var(--highlight-ratio), transparent var(--highlight-ratio));
			}

			a:hover,
			a:active {
				--highlight-ratio: 100%;
			}

			strong {
				text-shadow: 0 0 0.5em currentColor;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
