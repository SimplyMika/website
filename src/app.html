<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<style>
			:root {
				--black: oklab(0% 2% -2%);
				--night: oklab(10% 2% -2%);
				--slate: oklab(20% 2% -2%);

				--coral: oklab(65% 80% 25%);

				--shell: oklab(80% -2% 2%);
				--paper: oklab(90% -2% 2%);
				--white: oklab(100% -2% 2%);
			}

			body {
				margin: 0;

				background-color: var(--black);
				color: var(--white);
			}

			::selection {
				background-color: oklab(from var(--coral) l a b / 75%);
			}

			a {
				color: inherit;
				text-decoration: none;
				background: linear-gradient(to top, var(--coral) 25%, transparent 25%);
			}

			a:hover,
			a:active {
				background: linear-gradient(to top, var(--coral) 100%, transparent 100%);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
